<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Aiestrategias</title>
    <link rel="icon" href="logo.png">
    <style>
        body { background: #0f1117; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .page { display: none; width: 100%; max-width: 360px; padding: 20px; box-sizing: border-box; }
        .show { display: block; }
        .card { background: #1a1d27; padding: 30px; border-radius: 25px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        .logo { max-width: 180px; margin-bottom: 20px; }
        input, textarea { width: 100%; background: #0f1117; border: 1px solid #333; border-radius: 12px; padding: 14px; color: white; margin-bottom: 15px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: #0055ff; }
        label { display: block; text-align: left; font-size: 11px; color: #0055ff; font-weight: bold; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        .btn { background: #0055ff; color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #444; cursor: not-allowed; }
        .vendedor-tag { font-size: 12px; color: #10b981; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="p-login" class="page">
        <div class="card">
            <img src="logo.png" class="logo" alt="Aiestrategias">
            <p style="color: #888; margin-bottom: 20px;">Acceso Privado</p>
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn" id="btnLogin" onclick="login()">INGRESAR</button>
        </div>
    </div>

    <div id="p-form" class="page">
        <div class="card">
            <div id="vendedor-nombre" class="vendedor-tag"></div>
            <h2 style="margin: 0 0 20px 0; font-size: 20px;">Nuevo Referido</h2>
            
            <label>Nombre del Cliente</label>
            <input type="text" id="f-nom" placeholder="Ej: Juan Pérez">
            
            <label>Teléfono</label>
            <input type="tel" id="f-tel" placeholder="Ej: 3512345678">
            
            <label>Barrio / Localidad</label>
            <input type="text" id="f-bar" placeholder="Ej: Centro">
            
            <label>Observaciones</label>
            <textarea id="f-obs" rows="3" placeholder="Plan solicitado..."></textarea>
            
            <button class="btn" id="btnEnviar" onclick="enviar()">GUARDAR EN PLANILLA</button>
            <p onclick="logout()" style="margin-top: 20px; font-size: 12px; color: #555; cursor: pointer;">Cerrar Sesión</p>
        </div>
    </div>

    <script>
        // URL de tu script de Google Apps Script
        const URL_API = "https://script.google.com/macros/s/AKfycbx2JGutCO42COjzUXZ_CW5Q2KlQ44Tb0w0k4L5bUit2N5I0GuD2Qu49HcJ8OL1oASKa0Q/exec"; 

        // Al iniciar la web, revisamos si ya hay una sesión guardada
        window.onload = function() {
            const v_guardado = localStorage.getItem("vendedor_nombre");
            if (v_guardado) {
                iniciarApp(v_guardado);
            } else {
                document.getElementById('p-login').classList.add('show');
            }
        };

        async function login() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const btn = document.getElementById('btnLogin');

            if (!u || !p) return alert("Completa todos los campos");

            btn.disabled = true;
            btn.innerText = "Verificando...";

            try {
                const response = await fetch(URL_API, {
                    method: 'POST',
                    body: JSON.stringify({ accion: "login", usuario: u, password: p })
                });
                
                const res = await response.json();
