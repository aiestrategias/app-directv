<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DTV Sistema</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f1117; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1a1d27; padding: 20px; border-radius: 15px; max-width: 350px; margin: 20px auto; border: 1px solid #333; }
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; text-transform: uppercase; }
        .btn-green { background: #10b981; }
        .btn-purple { background: #8b5cf6; }
        .btn-blue { background: #0055ff; }
        .inp { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        .page { display: none; }
        .show { display: block; }
    </style>
</head>
<body>

    <div id="p-home" class="page show">
        <h1>DIREC<span style="color:#0055ff">TV</span></h1>
        <p style="color: gray; margin-bottom: 20px;">Seleccione su perfil</p>
        <div class="card">
            <button class="btn btn-green" onclick="irALogin('vendedor')">Acceso Vendedor</button>
            <button class="btn btn-purple" onclick="irALogin('supervisor')">Acceso Supervisor</button>
        </div>
    </div>

    <div id="p-login" class="page">
        <h2 id="login-title">LOGIN</h2>
        <div class="card">
            <input class="inp" id="u-user" placeholder="Usuario">
            <input class="inp" type="password" id="u-pass" placeholder="Contraseña">
            <button class="btn btn-blue" onclick="procesarLogin()">Entrar</button>
            <button style="background:none; color:gray; border:none; cursor:pointer;" onclick="location.reload()">← Volver</button>
        </div>
    </div>

    <div id="p-vendedor" class="page">
        <h2>Panel Vendedor</h2>
        <div class="card">
            <input class="inp" id="c-nom" placeholder="Nombre Cliente">
            <input class="inp" id="c-tel" placeholder="WhatsApp">
            <button class="btn btn-green" onclick="guardarCliente()">Guardar Referido</button>
        </div>
        <button class="btn" style="background:#333;" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div id="p-supervisor" class="page">
        <h2>Panel Supervisor</h2>
        <div class="card" id="lista-referidos">
            Cargando datos...
        </div>
        <button class="btn" style="background:#333;" onclick="logout()">Cerrar Sesión</button>
    </div>

    <script>
        const SURL = 'https://wxwmvnybdhlbbtkvlzuc.supabase.co';
        const SKEY = 'sb_publishable_FZQN55Ytuy3sWkoL-fCx9A_JE191GqS';
        const db = supabase.createClient(SURL, SKEY);

        let perfilSeleccionado = '';
        let usuarioActual = '';

        function irALogin(rol) {
            perfilSeleccionado = rol;
            document.getElementById('login-title').innerText = "LOGIN " + rol.toUpperCase();
            document.getElementById('p-home').classList.remove('show');
            document.getElementById('p-login').classList.add('show');
        }

        async function procesarLogin() {
            const u = document.getElementById('u-user').value;
            const p = document.getElementById('u-pass').value;

            if (perfilSeleccionado === 'supervisor') {
                if (u === 'Multitex' && p === 'ferfer2fer') {
                    abrirPanel('supervisor');
                } else { alert("Datos incorrectos"); }
            } else {
                const { data, error } = await db.from('dtv_vendedores').select('*').eq('usuario', u).eq('pass', p).single();
                if (data) {
                    usuarioActual = data.nombre;
                    abrirPanel('vendedor');
                } else { alert("Vendedor no encontrado"); }
            }
        }

        function abrirPanel(p) {
            document.querySelectorAll('.page').forEach(pag => pag.classList.remove('show'));
            document.getElementById('p-' + p).classList.add('show');
            if(p === 'supervisor') cargarDatosSup();
        }

        async function guardarCliente() {
            const n = document.getElementById('c-nom').value;
            const t = document.getElementById('c-tel').value;
            const { error } = await db.from('dtv_referidos').insert([{ nombre: n, telefono: t, vendedor_id: usuarioActual }]);
            if (error) alert("Error al guardar");
            else { alert("¡Guardado!"); location.reload(); }
        }

        async function cargarDatosSup() {
            const { data } = await db.from('dtv_referidos').select('*');
            const lista = document.getElementById('lista-referidos');
            if (data) {
                lista.innerHTML = data.map(r => `<div style="border-bottom:1px solid #444; padding:10px; text-align:left;">
                    <b>${r.nombre}</b><br><small>Vendedor: ${r.vendedor_id}</small>
                </div>`).join('');
            }
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
